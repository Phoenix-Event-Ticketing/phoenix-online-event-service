name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

  osv-scanner:
    name: OSV dependency vulnerability scan
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OSV-Scanner
        env:
          OSV_VERSION: "2.3.3"
        run: |
          curl -sSfL -o /tmp/osv-scanner "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run OSV Scanner
        id: osv_scan
        continue-on-error: true
        run: osv-scanner scan -r . --format sarif --output osv.sarif

      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv.sarif
          category: osv-scanner

      - name: Fail if OSV found vulnerabilities
        if: steps.osv_scan.outcome == 'failure'
        run: |
          echo "OSV Scanner reported vulnerabilities."
          exit 1

  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t phoenix-online-event-service:ci .

      - name: Run Trivy image scan
        id: trivy_image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: phoenix-online-event-service:ci
          scanners: vuln
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  sonar:
    name: SonarQube Cloud Analysis
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage for Sonar
        run: npm run test:coverage

      - name: Set Sonar Quality Gate mode
        id: sonar_qg
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "wait=true" >> "$GITHUB_OUTPUT"
          else
            echo "wait=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Cloud Analysis (+ QG on main)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=${{ steps.sonar_qg.outputs.wait }}
            -Dsonar.qualitygate.timeout=300
